profile_name: default_1280x720_cn
client_size:
  - 1280
  - 720

runtime:
  poll_ms: 100
  combat_enter_stable_frames: 3
  combat_exit_stable_frames: 8
  unsupported_scene_stable_frames: 3
  input_cooldown_ms: 120
  target_retry_interval_ms: 1000
  post_switch_delay_ms: 350
  idle_timeout_sec: 10.0
  dry_run_max_seconds: 2.0
  trace_limit: 240

keys:
  normal_attack: mouse_left
  skill: e
  ultimate: q
  arc: r
  target: mouse_middle
  switch_1: "1"
  switch_2: "2"
  switch_3: "3"
  switch_4: "4"

release_keys:
  - w
  - a
  - s
  - d
  - e
  - q
  - r
  - "1"
  - "2"
  - "3"
  - "4"

regions:
  target_icon:
    - 560
    - 40
    - 160
    - 80
  enemy_level_text:
    - 520
    - 20
    - 240
    - 80
  enemy_health_bar:
    - 430
    - 65
    - 420
    - 45
  boss_health_bar:
    - 260
    - 620
    - 760
    - 65
  team_panel:
    - 1020
    - 120
    - 240
    - 330
  skill:
    - 1015
    - 585
    - 58
    - 58
  ultimate:
    - 1090
    - 575
    - 70
    - 70
  arc:
    - 935
    - 585
