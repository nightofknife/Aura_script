    - 58

current_slot_regions:
  - [1150, 135, 88, 58]
  - [1150, 205, 88, 58]
  - [1150, 275, 88, 58]
  - [1150, 345, 88, 58]

hsv_rules:
  target_present:
    lower: [0, 0, 185]
    upper: [179, 95, 255]
    min_ratio: 0.035
  level_text:
    lower: [0, 0, 180]
    upper: [179, 80, 255]
    min_ratio: 0.025
  enemy_health_red:
    lower: [0, 75, 80]
    upper: [12, 255, 255]
    min_ratio: 0.020
    lower_2: [165, 75, 80]
    upper_2: [179, 255, 255]
  boss_health_red:
    lower: [0, 75, 80]
    upper: [12, 255, 255]
    min_ratio: 0.020
    lower_2: [165, 75, 80]
    upper_2: [179, 255, 255]
  team_hud:
    lower: [0, 0, 150]
    upper: [179, 90, 255]
    min_ratio: 0.025
  slot_active:
    lower: [78, 35, 95]
    upper: [105, 255, 255]
    min_ratio: 0.018
  ability_ready:
    lower: [15, 45, 95]
    upper: [45, 255, 255]
    min_ratio: 0.030

thresholds:
  supported_scene_min_features: 1
  combat_min_features: 2
  confidence_feature_count: 5

strategies:
  default:
    loop:
      - if_available: arc
      - if_available: ultimate
      - if_available: skill
      - normal:
          duration_ms: 900
      - switch: next

debug_snapshot_dir: tmp/combat_debug
