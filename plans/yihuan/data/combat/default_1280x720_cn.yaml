profile_name: default_1280x720_cn
client_size:
  - 1280
  - 720

runtime:
  poll_ms: 80
  monitor_scan_interval_sec: 2.0
  combat_scan_interval_sec: 3.0
  action_loop_sleep_ms: 80
  combat_enter_stable_frames: 2
  combat_exit_stable_frames: 10
  unsupported_scene_stable_frames: 3
  input_cooldown_ms: 120
  target_retry_interval_ms: 500
  skill_lockout_ms: 420
  ultimate_lockout_ms: 720
  post_combat_cooldown_ms: 700
  dry_run_max_seconds: 2.0
  trace_limit: 240

keys:
  normal_attack: mouse_left
  skill: e
  ultimate: q
  target: mouse_middle
  switch_1: "1"
  switch_2: "2"
  switch_3: "3"
  switch_4: "4"

release_keys:
  - w
  - a
  - s
  - d
  - shift
  - e
  - q
  - "1"
  - "2"
  - "3"
  - "4"

switch_policy:
  mode: fixed_rotation
  switch_interval_sec: 10.0
  empty_skill_loops_before_switch: 2
  confirm_timeout_ms: 480
  confirm_required_matches: 2
  post_switch_delay_ms: 0
  failed_switch_cooldown_ms: 350

combat_exit:
  confirm_required_scans: 2
  confirm_interval_sec: 1.0
  post_exit_cooldown_ms: 700
  challenge_success_immediate: true
  reset_on_reacquire: true

post_combat_reward:
  enabled: true
  search_timeout_sec: 14.0
  walk_timeout_sec: 26.0
  scan_interval_sec: 0.18
  align_target_x: 640
  align_tolerance_px: 50
  look_pixels_per_px: 0.55
  min_turn_pixels: 8
  max_turn_pixels: 160
  post_turn_delay_ms: 120
  walk_key: w
  walk_step_sec: 0.24
  interact_key: f
  post_interact_delay_ms: 120
  search_turn_pixels: 520
  search_turn_interval_sec: 0.65
  prompt_required_scans: 1

ability_schedule:
  skill_interval_sec: 3.0
  ultimate_interval_sec: 5.0
  immediate_on_combat_enter: true
  immediate_after_switch: true

input_timing:
  skill_press_ms: 45
  ultimate_press_ms: 55
  switch_press_ms: 35

regions:
  target_search_region:
    - 200
    - 120
    - 880
    - 320
  enemy_health_search_region:
