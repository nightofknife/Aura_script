    - 112

current_slot_regions:
  - [1138, 150, 110, 84]
  - [1138, 238, 110, 84]
  - [1138, 326, 110, 84]
  - [1138, 414, 110, 84]

hsv_rules:
  enemy_health_red:
    lower: [0, 212, 232]
    upper: [2, 232, 252]
    min_ratio: 0.02
    lower_2: [178, 212, 232]
    upper_2: [179, 232, 252]
  boss_health_red:
    lower: [0, 212, 232]
    upper: [2, 232, 252]
    min_ratio: 0.02
    lower_2: [178, 212, 232]
    upper_2: [179, 232, 252]
  team_hud:
    lower: [0, 0, 140]
    upper: [179, 100, 255]
    min_ratio: 0.02
  slot_active:
    lower: [60, 25, 90]
    upper: [110, 255, 255]
    min_ratio: 0.016
  ability_ready:
    lower: [12, 35, 120]
    upper: [55, 255, 255]
    min_ratio: 0.028
  enemy_direction_pink:
    lower: [170, 50, 150]
    upper: [179, 150, 255]
    min_ratio: 0.003
    lower_2: [0, 50, 150]
    upper_2: [4, 150, 255]
  remaining_enemy_marker_cyan:
    lower: [88, 80, 100]
    upper: [110, 255, 255]
    min_ratio: 0.01

ability_thresholds:
  ready:
    highlight_min_ratio: 0.028
    ring_highlight_min_ratio: 0.040
    secondary_highlight_min_ratio: 0.018
    bright_min_ratio: 0.12
    max_dark_ratio: 0.72
  cooldown:
    white_min_ratio: 0.010
    dark_min_ratio: 0.24
    bright_min_ratio: 0.08
  disabled:
    dark_min_ratio: 0.48
    bright_max_ratio: 0.16
    white_max_ratio: 0.012
  shared:
    white_sat_max: 45
    white_value_min: 170
    bright_value_min: 140
    dark_value_max: 95

enemy_health_rect:
  min_width: 24
  short_min_width: 12
  max_width: 220
  min_height: 2
  max_height: 8
  min_aspect_ratio: 4.0
  max_aspect_ratio: 90.0
  min_fill_ratio: 0.42
  short_max_y_ratio: 0.58

boss_health_rect:
  min_width: 220
  max_width: 900
  min_height: 4
  max_height: 24
  min_aspect_ratio: 8.0
  max_aspect_ratio: 120.0
  min_fill_ratio: 0.18

enemy_direction_rect:
  min_width: 10
  max_width: 40
  min_height: 10
  max_height: 40
  min_area: 80
  max_area: 420
  min_aspect_ratio: 0.55
  max_aspect_ratio: 1.6
  min_fill_ratio: 0.16
  max_fill_ratio: 0.88

remaining_enemy_marker_rect:
  min_width: 12
  max_width: 36
  min_height: 10
  max_height: 60
  min_area: 60
  max_area: 1200
  min_aspect_ratio: 0.35
  max_aspect_ratio: 1.65
  min_fill_ratio: 0.22
  max_fill_ratio: 0.90

enemy_direction_reacquire:
  turn_interval_sec: 0.9
  turn_pixels_side: 660
  turn_pixels_bottom: 1020
  vertical_delta: 0
  post_turn_delay_ms: 80
  auto_target_after_turn: true

thresholds:
  supported_scene_min_features: 1

templates:
  target_lock:
    path: default_1280x720_cn/target_lock_diamond.png
    search_region: [200, 120, 880, 320]
    match_threshold: 0.68
    scales: [0.75, 0.9, 1.0, 1.15, 1.3]
  remaining_enemy_marker:
    path: default_1280x720_cn/remaining_enemy_marker.png
    search_region: [20, 180, 55, 55]
    match_threshold: 0.78
    scales: [0.9, 1.0, 1.1]
  challenge_success:
    path: default_1280x720_cn/challenge_success.png
    search_region: [450, 130, 380, 150]
    match_threshold: 0.74
    scales: [1.0]
  reward_marker:
    path: default_1280x720_cn/reward_marker.png
    mask_path: default_1280x720_cn/reward_marker_mask.png
    search_region: [80, 300, 1040, 330]
    match_threshold: 0.72
    scales: [0.8, 0.9, 1.0, 1.12, 1.25]
  claim_memento_prompt:
    path: default_1280x720_cn/claim_memento_prompt.png
    search_region: [760, 372, 50, 50]
    match_threshold: 0.94
    scales: [0.9, 1.0, 1.08]

audio_dodge:
  enabled: true
  sample_path: audio/dodge_sample.wav
  sample_rate: 32000
  channels: 2
  chunk_size: 768
  threshold: 0.13
  ratio: 1.0
  allow_repeat: false
  cooldown_sec: 0.42
  window_sec: 0.22
  trigger_max_age_sec: 0.22
  reconnect_delay_sec: 2.0
  pre_emphasis: 0.97
  dodge_pause_ms: 120
  right_hold_ms: 18
  post_right_delay_ms: 10
  shift_hold_ms: 24
  dodge_key: shift
  dodge_mouse_button: right

strategies:
  default:
    loop:
      - if_available: ultimate
      - if_available: skill
      - normal:
          mode: tap_spam
          duration_ms: 560
          interval_ms: 70

debug_snapshot_dir: tmp/combat_debug
