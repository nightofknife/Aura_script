auto_loop:
  meta:
    title: 自动循环钓鱼
    description: 按停止策略持续重复执行钓鱼轮次。
    inputs:
      - name: max_rounds
        type: number
        default: 0
      - name: profile_name
        type: string
        default: default_1280x720_cn
      - name: sell_fish_every_rounds
        type: number
        default: 0
      - name: bait_buy_repeat_count
        type: number
        default: 1
      - name: sell_before_buy_bait
        type: boolean
        default: true
  steps:
    run:
      action: yihuan_fishing_run_session
      params:
        max_rounds: "{{ inputs.max_rounds }}"
        profile_name: "{{ inputs.profile_name }}"
        sell_fish_every_rounds: "{{ inputs.sell_fish_every_rounds }}"
        bait_buy_repeat_count: "{{ inputs.bait_buy_repeat_count }}"
        sell_before_buy_bait: "{{ inputs.sell_before_buy_bait }}"
  returns: "{{ nodes.run.output }}"
