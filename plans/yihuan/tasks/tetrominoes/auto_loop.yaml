auto_loop:
  meta:
    title: Tetrominoes auto loop
    description: Run the Yihuan Tetrominoes mini-game with survival-first planning.
    inputs:
      - name: profile_name
        type: string
        default: default_1280x720_cn
      - name: max_seconds
        type: number
        default: 0
      - name: max_pieces
        type: number
        default: 0
      - name: start_game
        type: boolean
        default: true
      - name: dry_run
        type: boolean
        default: false
      - name: debug_enabled
        type: boolean
        default: false
  steps:
    run:
      action: yihuan_tetrominoes_run_session
      params:
        profile_name: "{{ inputs.profile_name }}"
        max_seconds: "{{ inputs.max_seconds }}"
        max_pieces: "{{ inputs.max_pieces }}"
        start_game: "{{ inputs.start_game }}"
        dry_run: "{{ inputs.dry_run }}"
        debug_enabled: "{{ inputs.debug_enabled }}"
  returns: "{{ nodes.run.output }}"
