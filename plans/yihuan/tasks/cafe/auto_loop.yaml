auto_loop:
  meta:
    title: 沙威玛自动循环
    description: 自动执行异环餐饮小游戏，识别订单、补货并制作餐品。
    inputs:
      - name: profile_name
        type: string
        default: default_1280x720_cn
      - name: max_seconds
        type: number
        default: 0
      - name: max_orders
        type: number
        default: 0
      - name: start_game
        type: boolean
        default: true
      - name: wait_level_started
        type: boolean
        default: true
      - name: full_assist_auto_hammer_mode
        type: boolean
        default: false
      - name: min_order_interval_sec
        type: number
        default: 0.3
      - name: min_order_duration_sec
        type: number
        default: 0
  steps:
    run:
      action: yihuan_cafe_run_session
      params:
        profile_name: "{{ inputs.profile_name }}"
        max_seconds: "{{ inputs.max_seconds }}"
        max_orders: "{{ inputs.max_orders }}"
        start_game: "{{ inputs.start_game }}"
        wait_level_started: "{{ inputs.wait_level_started }}"
        full_assist_auto_hammer_mode: "{{ inputs.full_assist_auto_hammer_mode }}"
        min_order_interval_sec: "{{ inputs.min_order_interval_sec }}"
        min_order_duration_sec: "{{ inputs.min_order_duration_sec }}"
  returns: "{{ nodes.run.output }}"
