runtime:
  family: windows_desktop
  provider: windows
  target:
    mode: title
    title_regex: (异环|Neverness to Everness)
    exclude_titles:
    - AURA控制台
    - Crash Reporter
    - Unreal Engine
    allow_borderless: true
  capture:
    backend: gdi
  input:
    backend: sendinput
    mouse_move_duration_ms: 220
    key_interval_ms: 120
    click_post_delay_ms: 120
  rebind:
    enabled: true
    max_attempts: 2
    retry_delay_ms: 200
    error_codes:
    - window_target_lost
  window_spec:
    mode: false
input:
  profile: default_pc
  actions: {}
fishing:
  profile_name: default_1280x720_cn
cafe:
  profile_name: default_1280x720_cn
mahjong:
  profile_name: default_1280x720_cn
tetrominoes:
  profile_name: default_1280x720_cn
rhythm:
  profile_name: default_1280x720_cn
