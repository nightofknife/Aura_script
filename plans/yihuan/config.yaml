runtime:
  family: windows_desktop
  provider: windows
  target:
    mode: title
    title_regex: "(异环|Neverness to Everness)"
    exclude_titles:
      - AURA控制台
      - Crash Reporter
      - Unreal Engine
    allow_borderless: true
  capture:
    backend: wgc
  input:
    backend: sendinput
    mouse_move_duration_ms: 220
    key_interval_ms: 120
    click_post_delay_ms: 120
  window_spec:
    mode: off
input:
  profile: default_pc
  actions: {}
fishing:
  profile_name: default_1280x720_cn
cafe:
  profile_name: default_1280x720_cn
mahjong:
  profile_name: default_1280x720_cn
